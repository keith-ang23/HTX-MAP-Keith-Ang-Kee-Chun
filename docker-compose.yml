services:
  asr-api:
    container_name: asr-api
    image: htx-asr-api:latest
    build:
      context: .
      dockerfile: asr/Dockerfile
    ports:
      - "8001:8001"
    environment:
      ASR_MODEL_ID: facebook/wav2vec2-large-960h
      ASR_MODEL_CACHE_DIR: /app/model_cache
    volumes:
      - asr-model-cache:/app/model_cache
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8001/ping"]
      interval: 30s
      timeout: 5s
      start_period: 5m
      retries: 3
    mem_limit: 5g
    cpus: 4
    networks:
      - htx-stack

  es01:
    container_name: es01
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    environment:
      - node.name=es01
      - cluster.name=htx-cv-cluster
      - discovery.seed_hosts=es02
      - cluster.initial_master_nodes=es01,es02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es01-data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    mem_limit: 1536m
    networks:
      - htx-stack

  es02:
    container_name: es02
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    environment:
      - node.name=es02
      - cluster.name=htx-cv-cluster
      - discovery.seed_hosts=es01
      - cluster.initial_master_nodes=es01,es02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es02-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    mem_limit: 1536m
    networks:
      - htx-stack

  search-ui:
    container_name: search-ui
    image: htx-search-ui:latest
    build:
      context: ./search-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ELASTICSEARCH_HOST: http://es01:9200
      ELASTICSEARCH_INDEX: cv-transcriptions
    depends_on:
      es01:
        condition: service_healthy
      es02:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 512m
    networks:
      - htx-stack

volumes:
  asr-model-cache:
    name: htx-asr-model-cache
  es01-data:
    name: htx-es01-data
  es02-data:
    name: htx-es02-data

networks:
  htx-stack:
    name: htx-stack-network
    driver: bridge
