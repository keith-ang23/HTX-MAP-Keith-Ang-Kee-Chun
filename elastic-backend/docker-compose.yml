services:
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    container_name: es01
    environment:
      - node.name=es01
      - cluster.name=cv-elasticsearch-cluster
      - discovery.seed_hosts=es02
      - cluster.initial_master_nodes=es01,es02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es01-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null",
        ]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 60s
    mem_limit: 1536m
    mem_reservation: 768m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    networks:
      - elastic

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.2
    container_name: es02
    environment:
      - node.name=es02
      - cluster.name=cv-elasticsearch-cluster
      - discovery.seed_hosts=es01
      - cluster.initial_master_nodes=es01,es02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es02-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null",
        ]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 60s
    mem_limit: 1536m
    mem_reservation: 768m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    networks:
      - elastic

volumes:
  es01-data:
    name: htx-es01-data
  es02-data:
    name: htx-es02-data

networks:
  elastic:
    name: htx-elastic-network
