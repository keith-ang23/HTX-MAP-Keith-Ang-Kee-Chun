# Standalone Search UI deployment that joins the existing Elasticsearch network.
services:
  search-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: htx-search-ui:latest
    container_name: search-ui
    environment:
      # The browser calls this service; only the server-side proxy contacts Elasticsearch.
      PORT: "3000"
      ELASTICSEARCH_HOST: http://es01:9200
      ELASTICSEARCH_INDEX: cv-transcriptions
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--output-document=-",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped
    networks:
      - elastic

# Mark the network external because the Elasticsearch Compose project creates it.
networks:
  elastic:
    external: true
    name: htx-elastic-network
